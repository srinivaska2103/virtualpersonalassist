<!DOCTYPE html>
<html 
    x-data="{ 
        darkMode: localStorage.getItem('theme') === 'dark',
        isRtl: localStorage.getItem('direction') === 'rtl',
        toggleTheme() {
            this.darkMode = !this.darkMode;
            localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
        },
        toggleDirection() {
            this.isRtl = !this.isRtl;
            localStorage.setItem('direction', this.isRtl ? 'rtl' : 'ltr');
        }
    }"
    :class="{ 'dark': darkMode }"
    :dir="isRtl ? 'rtl' : 'ltr'"
    lang="en"
    class="h-full transition-colors duration-300"
>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='none' stroke='%236366f1' viewBox='0 0 24 24'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z'/></svg>">
    <title>Create Your Account &mdash; TaskVibe Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                           50: '#f0f3ff',
                            100: '#e1e7ff',
                            500: '#4f46e5', /* Core Unique Accent Color */
                            600: '#4338ca',
                            700: '#3730a3',
                            900: '#1e1b4b',
                        }
                    },
                    screens: { 'xs': '360px' }
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="h-full bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 flex flex-col justify-between p-4 transition-colors duration-300 antialiased font-sans relative overflow-x-hidden">

    <!-- Ambient Visual Glow Accents -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute top-[-10%] left-[50%] -translate-x-1/2 w-[350px] h-[350px] xs:w-[500px] xs:h-[500px] bg-brand-500/[0.04] dark:bg-brand-500/[0.02] rounded-full blur-3xl"></div>
    </div>

    <!-- UTILITY HEADER CONTROLLERS -->
    <header class="w-full max-w-md sm:max-w-lg md:max-w-xl lg:max-w-7xl mx-auto flex items-center justify-between h-16 select-none relative z-10">
   <!-- Unique Name Logo -->
            <a href="index.html" class="flex items-center space-x-2 font-semibold text-xl tracking-tight text-brand-500 dark:text-brand-500">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                <span>TaskVibe</span>
            </a>       

        <!-- System Configuration Toggles -->
        <div class="flex items-center gap-2 relative z-50">
            <button 
                @click="toggleTheme()"
                type="button"
                class="p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-500 dark:text-slate-400 hover:text-brand-500 dark:hover:text-brand-400 hover:border-brand-500/20 transition-all focus:outline-none shadow-sm"
                title="Toggle UI Color Environment"
            >
                <svg x-show="darkMode" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.243 17.657l.707.707M6.343 4.343l.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z"></path>
                </svg>
                <svg x-show="!darkMode" x-cloak class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                </svg>
            </button>
            <button 
                @click="toggleDirection()"
                type="button"
                class="px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-[11px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 hover:text-brand-500 dark:hover:text-brand-400 hover:border-brand-500/30 dark:hover:border-brand-400/30 shadow-sm transition-all focus:outline-none"
                x-text="isRtl ? 'LTR' : 'RTL'"
                title="Toggle Text Reading Direction"
            ></button>
        </div>
    </header>

    <!-- CENTERED COMPACT FORM MAIN WRAPPER CARD -->
    <main class="w-full max-w-md mx-auto my-auto py-6 relative z-10">
        <div class="bg-white dark:bg-slate-900 border border-slate-200/80 dark:border-slate-800/80 rounded-3xl p-6 xs:p-8 shadow-xl shadow-slate-100/50 dark:shadow-none transition-all duration-300">
            
            <!-- Auth Title Text Summary -->
            <div class="space-y-1.5 text-center">
                <h1 class="text-2xl font-semibold tracking-tight text-slate-900 dark:text-white">Get Started</h1>
                <p class="text-xs xs:text-sm text-slate-400 dark:text-slate-500 font-normal">Create your secure account track to delegate operations instantly.</p>
            </div>

            <!-- SECURITY REGISTRATION FORM BLOCK -->
            <form 
                x-data="{ showPassword: false, showConfirmPassword: false, acceptTerms: false }" 
                @submit.prevent="console.log('Registering user account parameters on TaskVibe server blocks...')" 
                class="mt-8 space-y-4"
            >
                <!-- Full Name Input Console Node -->
                <div class="space-y-1.5">
                    <label for="reg-name" class="text-[11px] font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">Full Name</label>
                    <input id="reg-name" type="text" required placeholder="John Doe" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:border-brand-500 dark:focus:border-brand-500 rounded-xl text-xs xs:text-sm font-normal focus:outline-none transition-all placeholder-slate-400 dark:placeholder-slate-600 shadow-inner" />
                </div>

                <!-- User Email Input Console Node -->
                <div class="space-y-1.5">
                    <label for="reg-email" class="text-[11px] font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">Email Address</label>
                    <input id="reg-email" type="email" required placeholder="you@domain.com" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:border-brand-500 dark:focus:border-brand-500 rounded-xl text-xs xs:text-sm font-normal focus:outline-none transition-all placeholder-slate-400 dark:placeholder-slate-600 shadow-inner" />
                </div>

                <!-- Password Input Console Node with Embedded Masking Trigger -->
                <div class="space-y-1.5 relative">
                    <label for="reg-password" class="text-[11px] font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">Password</label>
                    <div class="relative w-full">
                        <input id="reg-password" :type="showPassword ? 'text' : 'password'" required placeholder="••••••••" class="w-full pl-4 pr-11 dark:pl-4 dark:pr-11 rtl:pl-11 rtl:pr-4 dark:rtl:pl-11 dark:rtl:pr-4 py-3 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:border-brand-500 dark:focus:border-brand-500 rounded-xl text-xs xs:text-sm font-normal focus:outline-none transition-all placeholder-slate-400 dark:placeholder-slate-600 shadow-inner" />
                        <button @click="showPassword = !showPassword" type="button" class="absolute top-1/2 -translate-y-1/2 right-3.5 rtl:right-auto rtl:left-3.5 text-slate-400 dark:text-slate-500 hover:text-brand-500 focus:outline-none transition-colors" title="Toggle Password Visibility State">
                            <svg x-show="!showPassword" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            <svg x-show="showPassword" x-cloak class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.025 10.025 0 014.132-5.4M9.9 4.5A10.017 10.017 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.4M9.9 9.9a3 3 0 114.2 4.2M3 3l18 18"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password Input Console Node with Independent Embedded Masking Trigger -->
                <div class="space-y-1.5 relative">
                    <label for="reg-confirm-password" class="text-[11px] font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">Confirm Password</label>
                    <div class="relative w-full">
                        <input id="reg-confirm-password" :type="showConfirmPassword ? 'text' : 'password'" required placeholder="••••••••" class="w-full pl-4 pr-11 dark:pl-4 dark:pr-11 rtl:pl-11 rtl:pr-4 dark:rtl:pl-11 dark:rtl:pr-4 py-3 bg-slate-50 dark:bg-slate-950 border border-slate-200/80 dark:border-slate-800/80 focus:border-brand-500 dark:focus:border-brand-500 rounded-xl text-xs xs:text-sm font-normal focus:outline-none transition-all placeholder-slate-400 dark:placeholder-slate-600 shadow-inner" />
                        <button @click="showConfirmPassword = !showConfirmPassword" type="button" class="absolute top-1/2 -translate-y-1/2 right-3.5 rtl:right-auto rtl:left-3.5 text-slate-400 dark:text-slate-500 hover:text-brand-500 focus:outline-none transition-colors" title="Toggle Password Visibility State">
                            <svg x-show="!showConfirmPassword" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            <svg x-show="showConfirmPassword" x-cloak class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.025 10.025 0 014.132-5.4M9.9 4.5A10.017 10.017 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.4M9.9 9.9a3 3 0 114.2 4.2M3 3l18 18"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- TERMS AND REGULATORY AGREEMENT FRAME CHECKBOX ROW -->
                <div class="flex items-start gap-2 pt-1 select-none text-left">
                    <input id="accept-terms" type="checkbox" x-model="acceptTerms" required class="w-4 h-4 mt-0.5 rounded border-slate-200 dark:border-slate-800 text-brand-500 focus:ring-brand-500/10 bg-slate-50 dark:bg-slate-950 transition-colors cursor-pointer" />
                    <label for="accept-terms" class="text-xs text-slate-400 dark:text-slate-500 font-normal leading-normal cursor-pointer hover:text-slate-600 dark:hover:text-slate-400 transition-colors">
                        I acknowledge and accept the corporate <a href="terms.html" class="text-brand-500 dark:text-brand-400 font-medium hover:underline">Terms of Protocol</a> and secure cloud infrastructure data sharing guidelines.
                    </label>
                </div>

                <!-- FORM EXECUTIVE INITIATE TRIGGER BUTTON -->
                <div class="pt-2">
                    <button type="submit" class="w-full py-3.5 bg-brand-500 hover:bg-brand-600 text-white font-medium text-sm rounded-xl shadow-lg shadow-brand-500/10 transition-all transform hover:-translate-y-0.5 active:translate-y-0 focus:outline-none">
                        Create Workspace Account
                    </button>
                </div>
            </form>

            <!-- DESIGN BREAK MARGIN STRIATION BAR -->
            <div class="relative my-6 select-none">
                <div class="absolute inset-0 flex items-center" aria-hidden="true"><div class="w-full border-t border-slate-100 dark:border-slate-800"></div></div>
                <div class="relative flex justify-center text-[10px] uppercase font-semibold"><span class="bg-white dark:bg-slate-900 px-2 text-slate-400 dark:text-slate-500 tracking-wider">Or register with</span></div>
            </div>

           <div class="grid grid-cols-3 gap-3 w-full select-none">
    <button 
        type="button" 
        class="flex items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 hover:bg-slate-50 dark:hover:bg-slate-900 transition-all active:scale-95 focus:outline-none shadow-sm group" 
        title="Register via Google"
    >
        <svg class="w-4 h-4" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.85c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
    </button>
    
    <button 
        type="button" 
        class="flex items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 hover:bg-slate-50 dark:hover:bg-slate-900 transition-all active:scale-95 focus:outline-none shadow-sm group" 
        title="Register via Facebook"
    >
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="#1877F2" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
    </button>
    
    <button 
        type="button" 
        class="flex items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 hover:bg-slate-50 dark:hover:bg-slate-900 transition-all active:scale-95 focus:outline-none shadow-sm group" 
        title="Register via Apple"
    >
        <svg class="w-4 h-4 text-slate-900 dark:text-white fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.54 9.103 1.51 12.06 1.005 1.45 2.187 3.078 3.766 3.014 1.53-.063 2.114-.985 3.962-.985 1.838 0 2.378.985 3.978.955 1.62-.03 2.646-1.477 3.632-2.917 1.139-1.667 1.605-3.284 1.629-3.366-.03-.014-3.124-1.198-3.156-4.79-.028-2.985 2.444-4.416 2.56-4.484-1.398-2.049-3.555-2.28-4.316-2.34-1.99-.164-3.549 1.078-4.144 1.078zM15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.63.73-1.18 1.87-1.03 2.97 1.12.09 2.27-.57 2.97-1.4z"/>
        </svg>
    </button>
</div>

            <!-- LOGIN ROUTING INTER-LINK FOOTNOTE -->
            <p class="mt-8 text-center text-xs text-slate-400 dark:text-slate-500 font-normal">
                Already have an operational account? <a href="login.html" class="text-brand-500 dark:text-brand-400 hover:underline font-medium ml-0.5">Sign in</a>.
            </p>

        </div>
    </main>

    <!-- COMPLIANCE STAMP BASE FOOTER -->
    <footer class="w-full text-center text-[11px] text-slate-400 dark:text-slate-500 font-normal py-3 select-none relative z-10">
        &copy; 2026 TaskVibe Operations Inc. Insulated Vault Encryption.
    </footer>

</body>
</html>
